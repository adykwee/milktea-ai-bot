<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Tea AI - Order Dashboard</title>
    <!-- Modern Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Abstract blurred background elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="container">
        <header>
            <div class="logo">
                <i data-lucide="cup-soda"></i>
                <h1>Milk Tea AI Dashboard</h1>
            </div>
            <div class="header-status">
                <span class="live-dot"></span>
                <span>Live Orders</span>
            </div>
        </header>

        <main>
            <div class="orders-grid" id="orders-container">
                <!-- Orders will be injected here via JS -->
            </div>
            
            <div class="empty-state" id="empty-state">
                <i data-lucide="inbox"></i>
                <h2>Hiện không có đơn hàng mới nào</h2>
                <p>Waiting for incoming requests...</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
